# Cloudflare Named Tunnel config
# ─────────────────────────────────────────────────────────────────────────────
# Setup steps:
#   1. Go to Cloudflare Dashboard → Zero Trust → Networks → Tunnels
#   2. Create a tunnel → choose Cloudflared → copy the tunnel ID
#   3. Download the credentials JSON → save as cloudflared/creds.json
#   4. Add CNAMEs in Cloudflare DNS (see below)
#   5. Replace REPLACE_WITH_YOUR_TUNNEL_ID below with your tunnel ID
#
# DNS records to add (Cloudflare Dashboard → DNS):
#   ptas168.kilozin.xyz  CNAME  4778f1fe-177f-473b-8035-16af514cf47e.cfargotunnel.com  (proxied)
#   pos168.kilozin.xyz   CNAME  4778f1fe-177f-473b-8035-16af514cf47e.cfargotunnel.com  (proxied)
# ─────────────────────────────────────────────────────────────────────────────

tunnel: 4778f1fe-177f-473b-8035-16af514cf47e
credentials-file: /etc/cloudflared/creds.json

ingress:
  # PTAS168 — frontend nginx on host port 8080 (proxies /api → backend:3001)
  - hostname: ptas168.kilozin.xyz
    service: http://localhost:8080

  # POS168 — separate repo, frontend nginx on host port 8081
  # Make sure pos168 docker-compose.yml binds:  "127.0.0.1:8081:80"
  - hostname: pos168.kilozin.xyz
    service: http://localhost:8081

  # Catch-all — required, must be last
  - service: http_status:404
