name: 🚀 Deploy Backend → PM2

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js 25.9.0
        uses: actions/setup-node@v4
        with:
          node-version: '25.9.0'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧬 Generate Prisma client
        run: npm run prisma:generate

      - name: 🔨 Build TypeScript
        run: npm run build

      - name: 📤 Sync build to deploy dir
        run: |
          DEPLOY_DIR="$HOME/apps/${{ github.event.repository.name }}"
          mkdir -p "$DEPLOY_DIR/logs"
          rsync -a --delete \
            --exclude '.env.production' \
            --exclude 'logs/' \
            --exclude '.git/' \
            --exclude '.github/' \
            ./ "$DEPLOY_DIR/"

      - name: 🔐 Materialize .env.production from secrets
        env:
          DATABASE_URL:                 ${{ secrets.DATABASE_URL }}
          JWT_SECRET:                   ${{ secrets.JWT_SECRET }}
          TELEGRAM_BOT_TOKEN:           ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_BANK_BOT_TOKEN:      ${{ secrets.TELEGRAM_BANK_BOT_TOKEN }}
          TELEGRAM_BANK_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_BANK_WEBHOOK_SECRET }}
        run: |
          DEPLOY_DIR="$HOME/apps/${{ github.event.repository.name }}"
          mkdir -p "$DEPLOY_DIR"
          : "${DATABASE_URL:?missing GitHub secret DATABASE_URL}"
          : "${JWT_SECRET:?missing GitHub secret JWT_SECRET}"
          : "${TELEGRAM_BOT_TOKEN:?missing GitHub secret TELEGRAM_BOT_TOKEN}"
          umask 077
          {
            printf 'NODE_ENV=production\n'
            printf 'PORT=3001\n'
            printf 'DATABASE_URL=%s\n'        "$DATABASE_URL"
            printf 'JWT_SECRET=%s\n'          "$JWT_SECRET"
            printf 'JWT_EXPIRES_IN=24h\n'
            printf 'TELEGRAM_BOT_TOKEN=%s\n'  "$TELEGRAM_BOT_TOKEN"
            printf 'LOG_LEVEL=info\n'
            printf 'CORS_ORIGIN=https://4khmerapp.xyz\n'
            printf 'UPLOAD_DIR=/usr/local/Cellar/tomcat@10/10.1.52/libexec/webapps/ROOT/ptas168_file\n'
            printf 'FILE_URL_BASE=https://4khmerapp.xyz/ptas168_file\n'
            printf 'API_BASE_PATH=/ptas168/api\n'
            printf 'TELEGRAM_BANK_BOT_TOKEN=%s\n'      "$TELEGRAM_BANK_BOT_TOKEN"
            printf 'TELEGRAM_BANK_WEBHOOK_SECRET=%s\n' "$TELEGRAM_BANK_WEBHOOK_SECRET"
          } > "$DEPLOY_DIR/.env.production"
          chmod 600 "$DEPLOY_DIR/.env.production"

      - name: 🗄️ Apply Prisma migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          DEPLOY_DIR="$HOME/apps/${{ github.event.repository.name }}"
          cd "$DEPLOY_DIR"
          npm run prisma:deploy

      - name: 🌱 Seed master data (idempotent — upserts svc-water + svc-elec)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          DEPLOY_DIR="$HOME/apps/${{ github.event.repository.name }}"
          cd "$DEPLOY_DIR"
          npx prisma db seed

      - name: 🔁 Start / reload PM2
        run: |
          DEPLOY_DIR="$HOME/apps/${{ github.event.repository.name }}"
          cd "$DEPLOY_DIR"
          pm2 startOrReload ecosystem.config.js --env production
          pm2 save

      - name: ✅ Done
        run: echo "✅ Backend → http://127.0.0.1:3001"
