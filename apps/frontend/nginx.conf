# nginx config for the Dockerised frontend.
#
# Layout matches what Vite produces in dev:
#   /                    → 308 redirect to /Ptas168_Frontend/
#   /Ptas168_Frontend/   → SPA bundle (index.html + assets, with HTML5 fallback)
#   /api/...             → proxied to the backend service (compose DNS: `backend`)

server {
  listen 80;
  server_name _;

  # Standard SPA cache rules + gzip for static assets.
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 1024;

  # Root path redirect — matches the dev URL the team is used to.
  location = / {
    return 308 /Ptas168_Frontend/;
  }

  # Reverse-proxy /api/* to the backend container on its compose hostname.
  # Path is kept verbatim; trailing slash on proxy_pass would strip /api.
  location /api/ {
    proxy_pass http://backend:3001;
    proxy_http_version 1.1;
    # $http_host preserves the port the browser sent (e.g. localhost:8080).
    # $host alone drops the port, which breaks any backend code that builds
    # URLs from req.get('host') — like the disk-upload fallback URL.
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # /uploads/* — only used when the backend is in disk-storage mode (no R2
  # configured). The backend mounts express.static at /uploads, so we just
  # pass through. When R2 is in use, the returned URLs point at the R2
  # public domain directly and this block is never hit.
  location /uploads/ {
    proxy_pass http://backend:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;
  }

  # Static SPA — long-cache hashed assets, no-cache the HTML shell.
  location /Ptas168_Frontend/ {
    alias /usr/share/nginx/html/Ptas168_Frontend/;
    try_files $uri $uri/ /Ptas168_Frontend/index.html;

    location ~* \.(?:js|css|woff2?|ttf|png|jpg|jpeg|gif|svg|ico|webp)$ {
      expires 30d;
      add_header Cache-Control "public, immutable";
      access_log off;
    }

    location = /Ptas168_Frontend/index.html {
      add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
  }
}
