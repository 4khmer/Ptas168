server {
  listen 80;
  server_name _;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 1024;

  # Reverse-proxy /api/* to the backend container.
  location /api/ {
    proxy_pass http://backend:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # Cloudflare R2 file proxy — /files/<key> → R2 bucket public URL.
  # Files are served via ptas168.kilozin.xyz/files/* rather than the raw r2.dev URL.
  location /files/ {
    proxy_pass https://pub-31d85cfd26764008a65fe7fb62096519.r2.dev/;
    proxy_ssl_server_name on;
    proxy_set_header Host pub-31d85cfd26764008a65fe7fb62096519.r2.dev;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # R2 objects have content-addressed (hashed) keys — safe to cache long-term.
    add_header Cache-Control "public, max-age=2592000, immutable";
    proxy_read_timeout 30s;
  }

  # Disk-upload fallback (only active when R2 is not configured).
  location /uploads/ {
    proxy_pass http://backend:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;
  }

  # SPA — serve from root, HTML5 routing fallback.
  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;

    location ~* \.(?:js|css|woff2?|ttf|png|jpg|jpeg|gif|svg|ico|webp)$ {
      expires 30d;
      add_header Cache-Control "public, immutable";
      access_log off;
    }

    location = /index.html {
      add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
  }
}
