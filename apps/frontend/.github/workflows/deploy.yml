name: 🎨 Deploy Frontend → Tomcat

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js 25.9.0
        uses: actions/setup-node@v4
        with:
          node-version: '25.9.0'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build Vite
        run: npm run build

      - name: 📤 Deploy → Tomcat
        run: |
          rm -rf /usr/local/Cellar/tomcat@10/10.1.52/libexec/webapps/${{ github.event.repository.name }}
          cp -r dist /usr/local/Cellar/tomcat@10/10.1.52/libexec/webapps/${{ github.event.repository.name }}

      - name: ✅ Done
        run: echo "✅ Frontend → http://localhost:8080/${{ github.event.repository.name }}"
